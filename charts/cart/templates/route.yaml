{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  {{- with .Values.route.labels }}
  labels:
    {{ . | toYaml | nindent 4 }}
  {{- end }}
  name: {{ include "cart.fullname" . }}
spec:
  subdomain: {{ .Values.route.subdomain }}
  tls:
    {{ .Values.route.tls | toYaml | nindent 4 }}
  to:
    kind: Service
    name: {{ include "cart.fullname" . }}
{{- end }}
